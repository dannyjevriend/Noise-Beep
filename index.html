<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOISE — BEEP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --zinc-950: #0a0a0a;
            --zinc-800: #3a3a3a;
            --zinc-600: #7a7a7a;
            --zinc-400: #a1a1a1;
            --cyan-500: #06a9d9;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--zinc-950);
            color: var(--zinc-400);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        .border-zinc-800 {
            border-color: var(--zinc-800);
        }
        
        .shadow-cyan-500-20 {
            box-shadow: 0 0 15px rgba(6, 169, 217, 0.2);
        }
        
        .dial-rotation {
            transition: transform 0.05s ease-out;
        }
        
        #dialKnob {
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .no-scrollbar {
            -ms-overflow-style: none;
            -moz-scrollbar-width: none;
        }

        .ghost-btn {
            background-color: transparent;
            color: var(--zinc-400);
            border: 1px solid var(--zinc-800);
            transition: all 0.2s ease;
        }
        
        .ghost-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--zinc-600);
            color: #fff;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-400 h-screen w-screen">
    <div class="flex flex-col items-center justify-center h-full w-full gap-6">
        <div class="absolute bottom-4 text-zinc-600 font-mono text-[10px] tracking-widest">
            2026 Cline/oMLX/QWEN testje door Dannyjevriend.com
        </div>
        <div class="relative w-full max-w-[320px] aspect-square">
            <!-- SVG Radial Dial -->
            <svg 
                id="radialDial"
                class="cursor-ns-resize select-none drop-shadow-2xl w-full h-full"
                viewBox="0 0 320 320"
                role="slider"
                aria-label="Noise to Beep dial"
            >
                <!-- Background Circle -->
                <circle 
                    cx="160" 
                    cy="160" 
                    r="120" 
                    class="fill-zinc-900 stroke-zinc-800"
                    stroke-width="2"
                />
                
                <!-- Track -->
                <circle
                    id="dialTrack"
                    cx="160" 
                    cy="160" 
                    r="120" 
                    class="fill-none stroke-zinc-700"
                    stroke-width="2"
                    stroke-dasharray="565"
                    stroke-dashoffset="0"
                />
                
                <!-- Active Track -->
                <circle
                    id="dialActiveTrack"
                    cx="160" 
                    cy="160" 
                    r="120" 
                    class="fill-none stroke-cyan-500"
                    stroke-width="2"
                    stroke-dasharray="565"
                    stroke-dashoffset="565"
                />
                
                <!-- Labels -->
                <text 
                    x="160" 
                    y="260" 
                    text-anchor="middle" 
                    class="font-mono text-sm fill-zinc-500"
                >NOISE</text>
                
                <text 
                    x="160" 
                    y="80" 
                    text-anchor="middle" 
                    class="font-mono text-sm fill-zinc-500"
                >BEEP</text>
                
                <text 
                    id="positionLabel"
                    x="160" 
                    y="165" 
                    text-anchor="middle" 
                    class="font-mono text-base fill-cyan-500/80"
                ></text>
            </svg>
        </div>
        
        <h1 class="font-mono text-3xl font-semibold text-zinc-300 tracking-wider">
            NOISE — BEEP
        </h1>
        
        <button 
            id="muteBtn" 
            class="ghost-btn px-8 py-3 rounded text-sm font-mono tracking-wider"
        >
            START AUDIO
        </button>
        
        <div class="font-mono text-xs text-zinc-500">
            <span id="valueDisplay">Value: 0.00</span>
        </div>
    </div>

    <script>
        // Audio context and nodes
        let audioCtx = null;
        let noiseNode = null;
        let beepOscillator = null;
        let noiseGain = null;
        let beepGain = null;
        let masterGain = null;
        let isAudioStarted = false;
        let isDragging = false;
        let startY = 0;
        let startDialValue = 0;
        let dialValue = 0.0;

        // DOM Elements
        const radialDial = document.getElementById('radialDial');
        const dialActiveTrack = document.getElementById('dialActiveTrack');
        const positionLabel = document.getElementById('positionLabel');
        const valueDisplay = document.getElementById('valueDisplay');
        const muteBtn = document.getElementById('muteBtn');

        // Initialize Audio
        async function initAudio() {
            if (audioCtx) return;

            try {
                // Create AudioContext on user gesture
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContextClass({ latencyHint: 'interactive' });
                
                // Check if AudioContext is running, suspended, or closed
                console.log('AudioContext state:', audioCtx.state);

                // Check for iOS silent mode
                if (audioCtx.state === 'suspended') {
                    // Try to resume
                    await audioCtx.resume();
                    
                    // If still suspended after resume attempt, silent mode is enabled
                    if (audioCtx.state === 'suspended') {
                        // Silent mode is engaged
                        muteBtn.textContent = 'ENABLE SILENT MODE';
                        muteBtn.style.borderColor = 'var(--zinc-600)';
                        muteBtn.style.color = '#f9f4f4';
                        muteBtn.style.opacity = '1';
                        muteBtn.style.pointerEvents = 'auto';
                        
                        alert('iOS Silent Mode Detected:\n\nPlease turn OFF the Ringtone/Silent switch on your device.\n\nThe hardware switch on the left side of your iPhone controls this.');
                        return;
                    }
                }

                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.5;
                masterGain.connect(audioCtx.destination);

                // White noise source
                const bufferSize = audioCtx.sampleRate * 2;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }

                noiseNode = audioCtx.createBufferSource();
                noiseNode.buffer = buffer;
                noiseNode.loop = true;
                // Start AFTER all properties are set
                noiseNode.start();
                
                noiseGain = audioCtx.createGain();
                noiseGain.gain.value = 0;
                
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.value = 2000;
                
                noiseNode.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(masterGain);

                beepGain = audioCtx.createGain();
                beepGain.gain.value = 0;
                beepGain.connect(masterGain);

                // Set isAudioStarted ONLY after all nodes are ready
                isAudioStarted = true;
                
                // Update UI
                updateAudio();
            } catch (e) {
                console.error('Audio init error:', e);
                muteBtn.textContent = 'AUDIO STARTED';
                muteBtn.style.opacity = '0';
                muteBtn.style.pointerEvents = 'none';
            }
        }

        // Create a beep oscillator
        function createBeep() {
            if (!audioCtx) return null;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            const freq = 400 + Math.random() * 800;
            oscillator.frequency.value = freq;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            
            oscillator.connect(gainNode);
            gainNode.connect(beepGain);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.12);
            
            return oscillator;
        }

        // Update audio crossfade
        function updateAudio() {
            if (!isAudioStarted || !audioCtx) return;

            const targetNoiseGain = 1 - dialValue;
            const targetBeepGain = dialValue;

            const currentTime = audioCtx.currentTime;
            
            noiseGain.gain.setTargetAtTime(targetNoiseGain * 0.6, currentTime, 0.05);
            beepGain.gain.setTargetAtTime(targetBeepGain * 0.6, currentTime, 0.05);

            const isNoise = dialValue < 0.5;
            positionLabel.textContent = isNoise ? 'NOISE' : 'BEEP';
            positionLabel.style.color = isNoise ? 'rgba(6, 169, 217, 0.4)' : 'rgba(6, 169, 217, 0.9)';

            valueDisplay.textContent = `Value: ${dialValue.toFixed(2)}`;

            const circumference = 2 * Math.PI * 120;
            const offset = circumference - (dialValue * circumference);
            
            dialActiveTrack.style.strokeDashoffset = Math.max(0, Math.min(circumference, offset));
        }

        // Update UI
        function updateDialUI() {
            // The track is 270 degrees (from -135 to 135). 
            // We want the knob to point to the "leading edge" of the active track.
            // The track starts at -135 and goes clockwise.
            
            updateAudio();
        }

        // Drag handlers
        function handleMouseDown(e) {
            isDragging = true;
            startY = e.clientY;
            startDialValue = dialValue;
            
            if (isAudioStarted) {
                muteBtn.style.display = 'none';
            }
        }

        function handleMouseMove(e) {
            if (!isDragging) return;

            const deltaY = e.clientY - startY;
            const sensitivity = 0.005;
            let newValue = startDialValue - deltaY * sensitivity;
            
            newValue = Math.max(0, Math.min(1, newValue));
            
            dialValue = newValue;
            
            updateDialUI();
        }

        function handleMouseUp() {
            isDragging = false;
        }

        // Start button handler
        muteBtn.addEventListener('click', async () => {
            await initAudio();
            
            // If audio started successfully, hide button
            if (isAudioStarted) {
                muteBtn.textContent = 'AUDIO STARTED';
                muteBtn.style.opacity = '0';
                muteBtn.style.pointerEvents = 'none';
            }
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                dialValue = Math.min(1, dialValue + 0.1);
                updateDialUI();
                if (isAudioStarted) triggerBeep();
            } else if (e.key === 'ArrowDown') {
                dialValue = Math.max(0, dialValue - 0.1);
                updateDialUI();
            }
        });

        function triggerBeep() {
            if (!isAudioStarted || !audioCtx) return;
            
            if (beepOscillator) {
                try {
                    beepOscillator.stop();
                } catch (e) {}
            }
            
            beepOscillator = createBeep();
        }

        // Initial setup
        function startBeepInterval() {
            setInterval(() => {
                if (isAudioStarted && dialValue > 0.1) {
                    triggerBeep();
                }
            }, 2000);
        }

        // Event listeners
        window.addEventListener('mousedown', handleMouseDown);
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseup', handleMouseUp);

        // Touch support
        window.addEventListener('touchstart', (e) => {
            // Support both mouse and touch
            if (e.touches.length > 0) {
                handleMouseDown({ clientY: e.touches[0].clientY });
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length > 0) {
                handleMouseMove({ clientY: e.touches[0].clientY });
                // Prevent scrolling when interacting with the dial
                e.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('touchend', handleMouseUp);

        // Initialize
        updateDialUI();
        startBeepInterval();

        // Periodically check AudioContext state for silent mode changes
        // This will detect when the user turns off silent mode
        setInterval(() => {
            if (audioCtx && audioCtx.state === 'suspended' && isAudioStarted) {
                // AudioContext has been suspended (likely due to silent mode being re-enabled)
                console.log('AudioContext suspended - silent mode may be enabled');
                // Could add a visual indicator here if desired
            }
        }, 2000);
    </script>
</body>
</html>
